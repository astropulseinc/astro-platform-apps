# EKS Cluster Update
#
# Usage: astroctl infra k8s update <cluster-name> -f eks-update.yaml
# Docs:  https://astropulse.io/docs/latest/platform/cluster-pipeline/provisioner/managed/eks

apiVersion: platform.astropulse.io/v1
kind: K8sClusterUpdate
spec:
  # Optional: K8s version upgrade (must be valid upgrade path)
  # kubernetesVersion: "1.30"

  nodeGroups:
    - name: default-pool
      minNode: 2
      maxNode: 10
      # machineTypes:        # update triggers node replacement
      #   - t3.large
      labels:
        environment: production
        updated: "true"

  # eks:
  #   amiFamily: AL2023   # AL2023 (default), AL2, Bottlerocket, Ubuntu

  updateConfig:
    maxUnavailable: "1"
    maxSurge: "1"
    dryRun: false

  tags:
    environment: production
    team: platform
    updated-by: astroctl
