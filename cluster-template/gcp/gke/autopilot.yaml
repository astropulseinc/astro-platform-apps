# GKE Autopilot Cluster
#
# Fully managed — GKE handles node provisioning, scaling, and security patches.
# You pay per pod (CPU/memory), not per node. No dataPlane config needed.
#
# Prerequisites:
# 1. Run: astroctl cloud gcp connect --project-id <project> --cluster-name <name> --region <region>
#
# Usage: astroctl infra k8s apply -f gke-autopilot.yaml
# Docs:  https://astropulse.io/docs/latest/platform/cluster-pipeline/provisioner/managed/gke

apiVersion: platform.astropulse.io/v1
kind: K8sCluster
spec:
  clusterName: my-autopilot-cluster
  provider: gcp
  region: us-central1
  provisioner:
    type: gke
    gke:
      projectId: my-gcp-project-123

      autopilot: true

      credentials:
        type: dynamic

      # Optional: restrict API access to specific CIDRs
      # authorizedNetworks:
      #   - "10.0.0.0/8"
