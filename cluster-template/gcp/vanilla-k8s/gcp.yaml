# GCP Self-Hosted Kubernetes Cluster
#
# Setup:
#   astroctl cloud gcp selfHosted setup --project-id <id> --region <region> --cluster-name <name>
# Verify:
#   astroctl cloud gcp selfHosted connect --cluster-name <name>
#
# Usage: astroctl infra k8s apply -f gcp.yaml
# Docs:  https://astropulse.io/docs/latest/platform/cluster-pipeline/provisioner/self-hosted/gcp

apiVersion: platform.astropulse.io/v1
kind: K8sCluster
spec:
  clusterName: v-gcp-cluster
  provider: gcp
  provisioner:
    type: selfHosted
    selfHosted:
      accountId: "<YOUR_GCP_PROJECT_ID>"
      bucketName: "<from-setup-output>"

      # networkId: my-vpc  # optional: bring your own VPC

      credentials:
        type: vault

  clusterSpec:
    controlPlane:
      nodeGroup:
        name: control-plane
        machineTypes:
          - e2-medium
    dataPlane:
      nodeGroups:
        - name: worker-ng
          minNode: 3
          maxNode: 6
          instanceType: spot
          machineTypes:
            - e2-medium
          labels:
            environment: production
